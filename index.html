<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💬 CurhatYuk v2</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#f8f6f2;--tx:#1a1816;--sub:#8a8178;--p:#6c9a8b;--pd:#5a8576;--s:#d4a373;--bme:#e8f0ec;--bo:#fff;--bdr:#e8e3dc;--on:#4caf50}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;justify-content:center;user-select:none}
.app{width:100%;max-width:500px;min-height:100vh;background:#fff;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.08)}
.hdr{background:linear-gradient(135deg,#6c9a8b,#4a7a6a);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.hdr .back{font-size:20px;cursor:pointer;width:28px;text-align:center;opacity:.9}
.hdr .title{font-weight:700;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr .act{font-size:18px;cursor:pointer;padding:6px 8px;border-radius:8px;opacity:.9}
.scr{display:none;flex-direction:column;height:100vh}
.scr.on{display:flex}

.lw{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;background:linear-gradient(180deg,#f0ece7,#f8f6f2)}
.lw .logo{font-size:64px;margin-bottom:6px}
.lw h1{font-size:28px;font-weight:800}
.lw .tag{font-size:13px;color:var(--sub);margin-bottom:20px}
.ig{width:100%;max-width:300px;margin-bottom:10px;text-align:left}
.ig label{font-size:12px;font-weight:600;color:var(--sub);display:block;margin-bottom:3px}
.ig input,.ig select{width:100%;padding:11px 14px;border:2px solid var(--bdr);border-radius:12px;font-size:14px;font-family:inherit;background:#fafaf8}
.ig input:focus,.ig select:focus{outline:none;border-color:var(--p)}
.btn{padding:11px 28px;border-radius:22px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;width:100%;max-width:300px;transition:all .2s;letter-spacing:.3px}
.btn-p{background:var(--p);color:#fff}
.btn-p:hover{background:var(--pd)}
.btn-p:disabled{background:#bbb;cursor:not-allowed}
.btn-o{background:transparent;border:2px solid var(--p);color:var(--p);margin-top:6px}
.btn-s{padding:6px 14px;font-size:11px;width:auto;border-radius:14px}

.tw{flex:1;overflow-y:auto;padding:8px 10px}
.tw h3{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:10px 4px 4px}
.tc{display:flex;align-items:center;gap:10px;padding:12px;background:#f9f7f4;border-radius:12px;margin-bottom:6px;cursor:pointer;border:1px solid transparent;position:relative}
.tc:hover{background:#f0ece7;border-color:var(--bdr)}
.tc .badge{position:absolute;top:-4px;right:-4px;background:#e74c3c;color:#fff;font-size:9px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.tc .lock{font-size:10px;margin-left:4px}
.tci{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tcn{font-weight:700;font-size:14px}
.tcd{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tcm{text-align:right;flex-shrink:0;font-size:10px;color:var(--sub)}
.tcl{display:inline-block;width:7px;height:7px;background:var(--on);border-radius:50%;animation:pls 1.5s infinite;margin-right:3px}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}

.cm{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;background:#f5f0ea}
.msg{display:flex;gap:6px;max-width:88%;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg .avt{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700;color:#fff}
.msg .bbl{padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.4;word-break:break-word;max-width:100%}
.msg.me .bbl{background:var(--bme);border-bottom-right-radius:4px}
.msg.other .bbl{background:var(--bo);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.msg .sdr{font-size:10px;font-weight:700;color:var(--s);margin-bottom:1px}
.msg .tm{font-size:9px;color:var(--sub);margin-top:3px;text-align:right}
.msg .bem{font-size:36px;line-height:1.1}
.msg img{max-width:180px;max-height:180px;border-radius:8px;margin-top:4px;cursor:pointer}
.sys{text-align:center;font-size:10px;color:var(--sub);padding:5px;font-style:italic}

.ci{padding:8px 12px;background:#fff;border-top:1px solid var(--bdr);display:flex;gap:6px;align-items:flex-end;position:sticky;bottom:0;z-index:100}
.ci textarea{flex:1;border:none;background:#f5f0ea;border-radius:18px;padding:9px 14px;font-size:13px;font-family:inherit;resize:none;max-height:80px;line-height:1.4}
.ci textarea:focus{outline:none}
.ci .snd{width:38px;height:38px;border-radius:50%;background:var(--p);color:#fff;border:none;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ci .img-btn{width:32px;height:32px;border-radius:50%;background:transparent;border:1px solid var(--bdr);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}

.ob{display:flex;gap:6px;padding:6px 12px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--bdr);min-height:36px;align-items:center}
.ob .cnt{font-size:11px;font-weight:600;color:var(--on);margin-right:4px;white-space:nowrap}
.ob .none{font-size:10px;color:var(--sub);font-style:italic}
.ou{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:8px;color:var(--sub);flex-shrink:0}
.od{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;position:relative}
.od::after{content:'';width:7px;height:7px;background:var(--on);border:2px solid #fff;border-radius:50%;position:absolute;bottom:-1px;right:-1px}

.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal.on{display:flex}
.mb{background:#fff;border-radius:18px;padding:20px;width:100%;max-width:360px;max-height:80vh;overflow-y:auto}
.mb h3{font-size:16px;margin-bottom:12px}
.mb .color-pick{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.mb .color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.mb .color-dot.sel{border-color:var(--tx);transform:scale(1.2)}

.st{font-size:10px;text-align:center;padding:3px;background:#fffbe6;color:#b8860b}
.st.ok{background:#e8f5e9;color:#388e3c}

.stats-bar{display:flex;gap:8px;padding:8px 12px;overflow-x:auto;background:linear-gradient(135deg,#f9f7f4,#fff);border-bottom:1px solid var(--bdr)}
.stats-item{text-align:center;flex-shrink:0;padding:6px 12px;background:#fff;border-radius:10px;border:1px solid var(--bdr);font-size:10px}
.stats-item .val{font-size:18px;font-weight:800;color:var(--p)}
.stats-item .lbl{color:var(--sub)}

.img-preview{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:300;cursor:pointer}
.img-preview.on{display:flex}
.img-preview img{max-width:95%;max-height:95%;border-radius:8px}
</style>
</head>
<body>
<div class="app" id="app">

<div class="scr on" id="loginScreen">
<div class="lw">
<div class="logo">💬</div><h1>CurhatYuk</h1>
<div class="tag">Ngobrol • Curhat • Debat • Cari Temen</div>
<div class="ig"><label>Nama kamu</label><input type="text" id="ui" placeholder="Masukin nama..." maxlength="20" autocomplete="off"></div>
<button class="btn btn-p" id="lb" onclick="login()">🚀 Masuk & Ngobrol</button>
<div style="font-size:10px;color:var(--sub);margin-top:14px">🫂 Real-time • Private rooms • Share images</div>
</div></div>

<div class="scr" id="topicsScreen">
<div class="hdr"><span style="visibility:hidden">←</span><span class="title">💬 CurhatYuk</span><span class="act" onclick="sn()" title="Bikin Topik">＋</span></div>
<div class="st" id="cs">Menghubungkan...</div>
<div class="stats-bar" id="statsBar"></div>
<div class="tw" id="tl"><div style="text-align:center;padding:40px;color:var(--sub)">Memuat topik...</div></div></div>

<div class="scr" id="chatScreen">
<div class="hdr"><span class="back" onclick="gt()">←</span><span class="title" id="ct">Topik</span><span class="act" onclick="su()">👥</span></div>
<div class="ob" id="ob"><span class="none">memuat...</span></div>
<div class="cm" id="cmd"></div>
<div class="ci">
  <button class="img-btn" onclick="document.getElementById('imgInput').click()" title="Kirim gambar">🖼️</button>
  <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="sendImage()">
  <textarea id="mi" placeholder="Tulis pesan..." rows="1" onkeydown="hk(event)"></textarea>
  <button class="snd" id="sb" onclick="send()" disabled>➤</button>
</div></div>

<div class="modal" id="nm"><div class="mb"><h3>✨ Bikin Topik Baru</h3>
<div class="ig"><label>Emoji</label><input type="text" id="te" placeholder="💬" maxlength="2" style="font-size:20px;text-align:center;width:60px"></div>
<div class="ig"><label>Nama Topik</label><input type="text" id="tn" placeholder="Misal: Sepak Bola" maxlength="30"></div>
<div class="ig"><label>Deskripsi</label><input type="text" id="td" placeholder="Ngobrolin bola sepuasnya!" maxlength="50"></div>
<div class="ig"><label>🔒 Password (kosongin = publik)</label><input type="text" id="tpw" placeholder="Rahasia bareng temen" maxlength="20"></div>
<div class="ig"><label>🎨 Warna Tema</label><div class="color-pick" id="colorPick"></div></div>
<button class="btn btn-p" onclick="ct()">✅ Bikin Topik</button>
<button class="btn btn-o" onclick="cm('nm')">Batal</button></div></div>

<div class="modal" id="um"><div class="mb"><h3>👥 Online di Topik Ini</h3>
<div id="ul" style="max-height:300px;overflow-y:auto;"></div>
<button class="btn btn-o" onclick="cm('um')" style="margin-top:10px;">Tutup</button></div></div>

<div class="modal" id="pwModal"><div class="mb"><h3>🔒 Topik Private</h3>
<div class="ig"><label>Masukin password</label><input type="password" id="pwi" placeholder="Password..."></div>
<button class="btn btn-p" id="pwBtn" onclick="checkPw()">🔓 Buka</button>
<button class="btn btn-o" onclick="cm('pwModal')">Batal</button></div></div>

<div class="img-preview" id="imgPreview" onclick="this.classList.remove('on')"><img id="imgPreviewSrc" src=""></div>

</div>

<script>
(function initFirebase(){
  var k1="A"+"IzaS"+"yBrl"+"u-zqm"+"8xWqH2"+"BxXsW2"+"F_";
  var k2="0Jg4"+"fDyZ"+"ZRA";
  try{firebase.initializeApp({apiKey:k1+k2,authDomain:"curhatyuk-294f0.firebaseapp.com",databaseURL:"https://curhatyuk-294f0-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"curhatyuk-294f0",storageBucket:"curhatyuk-294f0.firebasestorage.app",messagingSenderId:"74402594391",appId:"1:74402594391:web:f11f0dfb0a1a14e5ce6d12"});console.log('🔥 Firebase OK')}catch(e){console.error(e)}
  window.db=firebase.database();
  db.ref('.info/connected').on('value',function(s){var el=document.getElementById('cs');if(el){if(s.val()===true){el.textContent='🟢 Terhubung';el.className='st ok'}else{el.textContent='🔴 Offline';el.className='st'}}});
  loadTopics();
})();

var U=null,T=null,ml=null,pl=null,mp=null;
var C=['#e74c3c','#e67e22','#f39c12','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63','#00bcd4','#ff5722','#795548','#607d8b','#16a085','#c0392b','#8e44ad','#d35400'];
var TOPIC_COLORS=['#6c9a8b','#e74c3c','#3498db','#e67e22','#8e44ad','#2ecc71','#f39c12','#1abc9c','#e91e63','#9b59b6','#00bcd4','#c0392b'];
function hc(n){var h=0;for(var i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return C[Math.abs(h)%C.length]}
function gid(){return db.ref().push().key}
function ts(){var d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function ss(id){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});document.getElementById(id).classList.add('on')}
function cm(id){document.getElementById(id).classList.remove('on')}

// Login
function login(){
  var name=document.getElementById('ui').value.trim();
  if(!name||name.length<2){alert('Isi nama dulu 😊');return}
  var uid=gid();U={id:uid,name:name,color:hc(name),initial:name.charAt(0).toUpperCase()};
  db.ref('users/'+uid).set({name:name,color:U.color,lastSeen:firebase.database.ServerValue.TIMESTAMP});
  var uo=db.ref('users/'+uid+'/online');
  db.ref('.info/connected').on('value',function(s){if(s.val()===true){uo.set(firebase.database.ServerValue.TIMESTAMP);uo.onDisconnect().remove()}});
  localStorage.setItem('cy_u2',JSON.stringify(U));ss('topicsScreen');loadTopics();
}

(function(){var s=localStorage.getItem('cy_u2');if(s){U=JSON.parse(s);document.getElementById('ui').value=U.name;if(db){var uo=db.ref('users/'+U.id+'/online');db.ref('.info/connected').on('value',function(x){if(x.val()===true){uo.set(firebase.database.ServerValue.TIMESTAMP);uo.onDisconnect().remove()}})}}})();

// Topics
var DT=[{e:'⚽',n:'Sepak Bola',d:'Liga, tim favorit, transfer!',c:'#4a9e6b'},{e:'🗳️',n:'Politik & Isu',d:'Debat politik terkini',c:'#c0392b'},{e:'🎵',n:'Musik & Lagu',d:'Rekomendasi lagu & konser',c:'#8e44ad'},{e:'🎬',n:'Anime & Film',d:'Ngobrolin anime favorit',c:'#e67e22'},{e:'🎓',n:'Dunia Kuliah',d:'Tugas, dosen, skripsi!',c:'#2980b9'},{e:'💔',n:'Cinta & Patah Hati',d:'Curhat soal doi & mantan',c:'#e74c8b'},{e:'🧠',n:'Mental Health',d:'Support group — cerita',c:'#6c9a8b'},{e:'🎮',n:'Gaming',d:'Valorant, ML, Genshin!',c:'#2c3e50'},{e:'🍜',n:'Kuliner & Makanan',d:'Rekomendasi enak!',c:'#d35400'},{e:'💻',n:'Teknologi & AI',d:'Gadget, coding, AI',c:'#1a5276'},{e:'🎲',n:'Random / Bebas',d:'Ngobrol apa aja!',c:'#7f8c8d'},{e:'🫂',n:'Curhat Malam',d:'Nangis bareng 🥲',c:'#5b4a6a'}];

var pendingTopic=null;

function loadTopics(){
  if(!db){setTimeout(loadTopics,500);return}
  db.ref('topics').once('value').then(function(snap){
    var topics=snap.val();
    if(!topics){var up={};DT.forEach(function(t){var id=t.n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');up[id]={emoji:t.e,name:t.n,desc:t.d,color:t.c,password:null,createdAt:firebase.database.ServerValue.TIMESTAMP}});db.ref('topics').set(up).then(function(){loadTopics()});return}
    db.ref('topic_presence').once('value').then(function(psnap){
      var presence=psnap.val()||{};var cutoff=Date.now()-60000;
      var totalOnline=0;
      var arr=Object.keys(topics).map(function(id){
        var t=topics[id];var online=0;
        if(presence[id]){online=Object.values(presence[id]).filter(function(u){return u.timestamp>cutoff}).length}
        totalOnline+=online;
        return {id:id,online:online,name:t.name,emoji:t.emoji,desc:t.desc,color:t.color,password:t.password||null,createdAt:t.createdAt};
      });
      arr.sort(function(a,b){if(a.online>0&&b.online===0)return -1;if(b.online>0&&a.online===0)return 1;return(b.createdAt||0)-(a.createdAt||0)});
      renderTopics(arr,totalOnline);
      updateStats(arr);
    });
  }).catch(function(e){document.getElementById('tl').innerHTML='<div style="text-align:center;padding:40px;color:#c0392b">❌ '+e.message+'<br><small>Cek Firebase Rules!</small></div>'});
}

function updateStats(arr){
  var totalTopics=arr.length;
  var totalOnline=arr.reduce(function(s,t){return s+t.online},0);
  var totalMsgs=0;
  arr.forEach(function(t){totalMsgs+=(t.msgCount||0)});
  document.getElementById('statsBar').innerHTML=
    '<div class="stats-item"><div class="val">'+totalOnline+'</div><div class="lbl">Online</div></div>'+
    '<div class="stats-item"><div class="val">'+totalTopics+'</div><div class="lbl">Topik</div></div>'+
    '<div class="stats-item"><div class="val">'+totalMsgs+'</div><div class="lbl">Pesan</div></div>';
}

function renderTopics(arr,totalOnline){
  var live=arr.filter(function(t){return t.online>0});
  var rest=arr.filter(function(t){return t.online===0});
  document.getElementById('tl').innerHTML=
    (live.length>0?'<h3>🟢 '+totalOnline+' online di '+live.length+' topik</h3>'+live.map(tc).join(''):'')+
    '<h3>📚 Semua Topik</h3>'+rest.map(tc).join('');
}

function tc(t){
  var lockIcon=t.password?' 🔒':'';
  return '<div class="tc" onclick="openTopic(\''+t.id+'\')" style="'+(t.password?'border-left:3px solid #f39c12;':'')+'">'+
    '<div class="tci" style="background:'+(t.color||'#999')+'20;color:'+(t.color||'#999')+'">'+(t.emoji||'💬')+'</div>'+
    '<div style="flex:1;min-width:0"><div class="tcn">'+t.name+lockIcon+'</div><div class="tcd">'+(t.desc||'')+'</div></div>'+
    '<div class="tcm">'+(t.online>0?'<span class="tcl"></span>'+t.online:'')+'</div>'+
    (t.online>0?'<div class="badge">'+t.online+'</div>':'')+
    '</div>';
}

// Color picker
function buildColorPicker(){
  var html='';
  TOPIC_COLORS.forEach(function(c,i){
    html+='<div class="color-dot'+(i===0?' sel':'')+'" style="background:'+c+'" data-color="'+c+'" onclick="pickColor(this)"></div>';
  });
  document.getElementById('colorPick').innerHTML=html;
}
buildColorPicker();
var selectedColor=TOPIC_COLORS[0];
function pickColor(el){
  document.querySelectorAll('.color-dot').forEach(function(d){d.classList.remove('sel')});
  el.classList.add('sel');selectedColor=el.dataset.color;
}

function sn(){document.getElementById('te').value='';document.getElementById('tn').value='';document.getElementById('td').value='';document.getElementById('tpw').value='';selectedColor=TOPIC_COLORS[0];buildColorPicker();document.getElementById('nm').classList.add('on')}

function ct(){
  var emoji=document.getElementById('te').value.trim()||'💬';
  var name=document.getElementById('tn').value.trim();
  var desc=document.getElementById('td').value.trim()||'Topik baru!';
  var pw=document.getElementById('tpw').value.trim()||null;
  if(!name){alert('Isi nama topik!');return}
  var id=name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'-'+Date.now().toString(36);
  db.ref('topics/'+id).set({emoji:emoji,name:name,desc:desc,color:selectedColor,password:pw,createdAt:firebase.database.ServerValue.TIMESTAMP}).then(function(){cm('nm');alert('✅ Topik dibuat!');loadTopics()}).catch(function(e){alert('Gagal: '+e.message)});
}

// Chat
var pendingPw=null;

function openTopic(topicId){
  if(!U||!db)return;
  if(ml){db.ref('messages/'+(T?T.id:'')).off('child_added',ml);ml=null}
  if(pl){db.ref('topic_presence/'+(T?T.id:'')).off('value',pl);pl=null}
  if(mp){mp.remove();mp=null}
  
  db.ref('topics/'+topicId).once('value').then(function(snap){
    var topic=snap.val();
    if(!topic){alert('Topik tidak ditemukan');return}
    
    if(topic.password && !localStorage.getItem('pw_'+topicId)){
      pendingPw={id:topicId,topic:topic};
      document.getElementById('pwi').value='';
      document.getElementById('pwModal').classList.add('on');
      return;
    }
    enterTopic(topicId,topic);
  });
}

function checkPw(){
  if(!pendingPw)return;
  var pw=document.getElementById('pwi').value.trim();
  if(pw===pendingPw.topic.password){
    localStorage.setItem('pw_'+pendingPw.id,'1');
    cm('pwModal');
    enterTopic(pendingPw.id,pendingPw.topic);
  }else{alert('Password salah!');}
}

document.getElementById('pwi').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw()});

function enterTopic(topicId,topic){
  T={id:topicId,name:topic.name,emoji:topic.emoji,color:topic.color,password:topic.password};
  document.getElementById('ct').textContent=(topic.emoji||'💬')+' '+topic.name+(topic.password?' 🔒':'');
  document.getElementById('cmd').innerHTML='';
  ss('chatScreen');
  
  mp=db.ref('topic_presence/'+topicId+'/'+U.id);
  mp.set({name:U.name,color:U.color,timestamp:firebase.database.ServerValue.TIMESTAMP});
  mp.onDisconnect().remove();
  
  pl=function(snap){renderOnline(snap.val()||{})};
  db.ref('topic_presence/'+topicId).on('value',pl);
  
  ml=function(snap){addMsg(snap.val(),snap.key)};
  db.ref('messages/'+topicId).orderByChild('timestamp').limitToLast(80).on('child_added',ml);
  
  setInterval(function(){if(T&&mp)mp.update({timestamp:firebase.database.ServerValue.TIMESTAMP})},30000);
  document.getElementById('mi').focus();
}

function renderOnline(users){
  var bar=document.getElementById('ob');
  var cutoff=Date.now()-60000;
  var active=Object.entries(users).filter(function(e){return e[1].timestamp>cutoff}).map(function(e){return e[1]});
  if(active.length===0){bar.innerHTML='<span class="none">Belum ada online — kamu duluan! 🎉</span>';return}
  bar.innerHTML='<span class="cnt">👥 '+active.length+' online</span>'+active.map(function(u){return'<div class="ou" title="'+u.name+'"><div class="od" style="background:'+(u.color||'#999')+'">'+(u.name||'?')[0].toUpperCase()+'</div><span>'+(u.name||'?')+'</span></div>'}).join('');
}

function addMsg(msg,msgId){
  if(!U||!T)return;
  var container=document.getElementById('cmd');
  if(document.getElementById('m-'+msgId))return;
  if(msg.type==='system'){var d=document.createElement('div');d.className='sys';d.id='m-'+msgId;d.textContent=msg.text||'';container.appendChild(d);scrollDown();return}
  
  var isMe=msg.senderId===U.id;
  var text=(msg.text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var d=document.createElement('div');
  d.className='msg '+(isMe?'me':'other');d.id='m-'+msgId;
  
  var avt='<div class="avt" style="background:'+(isMe?U.color:(msg.senderColor||'#999'))+'">'+(isMe?U.initial:(msg.senderName||'?')[0].toUpperCase())+'</div>';
  var sdr=!isMe?'<div class="sdr">'+(msg.senderName||'Anon')+'</div>':'';
  var imgHtml='';
  if(msg.image){imgHtml='<br><img src="'+msg.image+'" onclick="viewImage(\''+msg.image+'\')" style="max-width:180px;max-height:180px;border-radius:8px;margin-top:4px;cursor:pointer" loading="lazy">'}
  var content=msg.image&&!msg.text?'📷 Gambar':text;
  var tm='<div class="tm">'+(msg.time||'')+'</div>';
  
  if(isMe){d.innerHTML='<div class="bbl">'+content+imgHtml+tm+'</div>'+avt}
  else{d.innerHTML=avt+'<div class="bbl">'+sdr+content+imgHtml+tm+'</div>'}
  container.appendChild(d);scrollDown();
}

function viewImage(src){document.getElementById('imgPreviewSrc').src=src;document.getElementById('imgPreview').classList.add('on')}

function send(){
  if(!T||!U)return;
  var input=document.getElementById('mi');var text=input.value.trim();
  if(!text)return;
  db.ref('messages/'+T.id).push({type:'message',senderId:U.id,senderName:U.name,senderColor:U.color,text:text,time:ts(),timestamp:firebase.database.ServerValue.TIMESTAMP}).catch(function(e){alert('Gagal: '+e.message)});
  input.value='';document.getElementById('sb').disabled=true;
}

function sendImage(){
  var file=document.getElementById('imgInput').files[0];
  if(!file)return;
  if(file.size>500000){alert('Gambar maksimal 500KB!');return}
  var reader=new FileReader();
  reader.onload=function(e){
    db.ref('messages/'+T.id).push({type:'message',senderId:U.id,senderName:U.name,senderColor:U.color,text:'',image:e.target.result,time:ts(),timestamp:firebase.database.ServerValue.TIMESTAMP}).catch(function(e){alert('Gagal: '+e.message)});
  };
  reader.readAsDataURL(file);
  document.getElementById('imgInput').value='';
}

function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}setTimeout(function(){document.getElementById('sb').disabled=!document.getElementById('mi').value.trim()},50)}
function scrollDown(){var c=document.getElementById('cmd');setTimeout(function(){c.scrollTop=c.scrollHeight},100)}

function gt(){
  if(ml){db.ref('messages/'+(T?T.id:'')).off('child_added',ml);ml=null}
  if(pl){db.ref('topic_presence/'+(T?T.id:'')).off('value',pl);pl=null}
  if(mp){mp.remove();mp=null}
  T=null;ss('topicsScreen');loadTopics();
}

function su(){
  if(!T)return;
  db.ref('topic_presence/'+T.id).once('value').then(function(snap){
    var users=snap.val()||{};var cutoff=Date.now()-60000;
    var active=Object.entries(users).filter(function(e){return e[1].timestamp>cutoff});
    document.getElementById('ul').innerHTML=active.length>0?active.map(function(e){var u=e[1];return'<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #eee"><div style="width:32px;height:32px;border-radius:50%;background:'+u.color+';display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px">'+u.name[0].toUpperCase()+'</div><span style="font-weight:600;font-size:13px">'+u.name+'</span>'+(e[0]===U.id?'<span style="font-size:9px;color:var(--sub);margin-left:auto">kamu</span>':'<span style="font-size:9px;color:var(--on);margin-left:auto">🟢</span>')+'</div>'}).join(''):'<p style="font-size:12px;color:var(--sub)">Ga ada yang online</p>';
    document.getElementById('um').classList.add('on');
  });
}

document.getElementById('mi').addEventListener('input',function(){document.getElementById('sb').disabled=!this.value.trim()});
document.getElementById('ui').addEventListener('keydown',function(e){if(e.key==='Enter')login()});
</script>
</body>
</html>
